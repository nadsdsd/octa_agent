seed: 42

model_type: dual_timm

image_backbone_name: resnet50
mask_backbone_name: resnet18
pretrained: true

freeze_image_backbone: false
freeze_mask_backbone: true

img_size: 224

sample_mode: image_mask_metrics
mask_size: 224

output_dir: outputs/dualbranch_resnet_6mm_transformer_seed_42
aux_mode: fusion
train_csv: metadata/mask_6mm_train.csv
val_csv: metadata/mask_6mm_val.csv
test_csv: metadata/mask_6mm_test.csv

image_cols:
  - orig_path

label_col: label_id
label_name_col: label_name
num_classes: 7

metrics_cols:
  - faz_area_px
  - faz_perim_px
  - faz_circularity
  - rv_density
  - rv_flow_area_px
  - "rv_line_density_px-1"
  - rv_branch_points
  - faz300_sim_density

metrics_hidden_dim: 128
image_feat_dim: 512
mask_feat_dim: 32

dropout: 0.3

batch_size: 6
grad_accum_steps: 1
num_workers: 0

epochs: 35
lr: 1.0e-4
weight_decay: 1.0e-4
warmup_ratio: 0.05
max_grad_norm: 1.0

mixed_precision: fp16

class_weight_mode: balanced
metric_for_best: balanced_accuracy
early_stop_patience: 35
save_every_epoch: false
# loss_type: focal
# focal_gamma: 1.5

